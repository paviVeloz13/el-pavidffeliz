<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iLovePaviDF</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      background: #f5f5f7;
      color: #1d1d1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
    }
    h1 { font-size: 2rem; margin: 0; }
    button {
      font-size: 1.1rem;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      border: none;
      background: #0071e3;
      color: #fff;
      cursor: pointer;
      min-width: 200px;
      min-height: 48px;
    }
    button:hover { background: #0077ed; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status {
      font-size: 0.95rem;
      color: #555;
      max-width: 600px;
      text-align: center;
      white-space: pre-wrap;
      word-break: break-word;
      background: #fff;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      min-height: 3rem;
      width: 90%;
    }
    .ok   { color: #1a7f37; }
    .err  { color: #d1242f; }
  </style>
</head>
<body>
  <h1>iLovePaviDF</h1>
  <p style="margin:0;color:#555">Milestone 5 — IPC smoke test</p>

  <button id="btn-health">Run health check</button>
  <div id="status">Press the button to ping the Python worker.</div>

  <script src="app.js"></script>
</body>
</html>
